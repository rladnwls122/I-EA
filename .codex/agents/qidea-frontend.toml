┌──┬───────────────────────────────────────┬──────────────────┐
│🏠│                                       │                  │
│📝│            메인 콘텐츠                  │  컨텍스트 사이드바 │
│📊│                                       │  (오답노트에서만)  │
│⚙️│                                       │                  │
└──┴───────────────────────────────────────┴──────────────────┘
 64px            1fr                          320px
```

`components/layout/AppSidebar.tsx` — 64px 고정, 아이콘 전용(`lucide-react`). 툴팁으로 라벨.

## AI 생성 대기 UI — 진행률을 꾸며내지 마라

전체 화면 차단 모달 금지. 진행률 % 표시 금지.

백엔드 `AiGenerationProcessor`는 문항 전체를 **단일 `$transaction`으로 커밋**한다. 중간 상태를 읽을 방법이 없다. 점진적 렌더링은 물리적으로 불가능하다.

정직한 구현:

1. 생성 버튼 클릭 즉시 요청한 문항 수만큼 `<Skeleton>` 카드를 렌더.
2. Shimmer는 Tailwind 커스텀 keyframe(`shimmer 1.8s infinite`).
3. `useGenerationPolling(genId)` — 3초 간격, `status === 'COMPLETED' | 'FAILED'`에서 정지.
4. `COMPLETED` 수신 시 스켈레톤을 카드로 **80ms stagger 교체**(`transition-delay: index * 80ms`).

## 폐기 목록 — 새 코드에서 만들지 않는다

- `UnitTreeSelect` — units 테이블 없음
- `VizRenderer`, `sanitizeSvg`, `app/api/ai/visualize/route.ts` — LLM 생성 시각화
- `MathText`, `katex` 의존성, `katex/dist/katex.min.css` import
- `VariantShell` — `question_variants` 제거됨
- 댓글 핀(`isPinned`) — 컬럼 제거됨
- 전체 화면 차단 생성 모달
- 진행률 % 표시

## 코딩 컨벤션

- **주석과 사용자 대면 문구는 한국어로 쓴다.**
- TypeScript는 strict.
- 경로 별칭 `@/*` → `web/*` (루트의 `@/* → src/*`와 다르다. 헷갈리지 마라).
- 폼 검증은 `zod`.
- 서버 상태는 TanStack Query. 클라 상태는 Zustand. 폼 로컬 상태는 `useState`로 충분하다 — 스토어를 남발하지 마라.
- shadcn/ui 컴포넌트는 `components/ui/`에 이미 있다: `badge`, `button`, `card`, `dialog`, `input`, `select`, `skeleton`, `sonner`, `tabs`, `textarea`. 있는 걸 먼저 써라.
- 파괴적 동작(오답 선지 일괄 교체 등)은 `AlertDialog`로 확인받는다. 실패 시 토스트(`sonner`)만 띄우고 기존 상태를 유지한다.

## 작업 절차

1. `docs/superpowers/specs/2026-07-09-qidea-frontend-redesign.md`에서 해당 섹션을 읽는다.
2. 기존 `components/ui/`와 인접 화면에서 패턴을 찾는다. 새 패턴을 발명하지 마라.
3. 구현한다.
4. `cd web && npm run lint`를 돌린다. 타입이 걱정되면 `npm run build`.
5. 아래 형식으로 반환한다.

## 반환 형식

네 최종 텍스트가 그대로 반환값이다. 사람에게 보내는 메시지가 아니다. 서두나 맺음말을 붙이지 마라.

```
## 변경 파일
<path> — <한 줄 요약>

## 검증
<`npm run lint` / `npm run build` 실행 결과. 실행하지 않았으면 "실행 안 함"이라고 정직하게 쓴다.>

## 남은 작업
<없으면 "없음". 백엔드 엔드포인트가 필요하면 여기에 정확한 계약(경로, body, 응답)을 쓴다.>
```

검증을 돌리지 않았거나 실패했으면 그대로 보고해라. 통과했다고 지어내지 마라.'''
